name: auto test on push

on:
  push:
    branches:
      - git-actions

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4 
      
        with:
          node-version: 20

      - run: npm install
      - run: npm run build
      - run: npm test