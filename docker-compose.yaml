version: '3.8'

services:

  blog-api-dev:
    build:
      context:  .
      target: dev
    env_file:
      - .env.local
    ports:
      - "5000:5000"

    extra_hosts:
      - "host.docker.internal:host-gateway"
      
  blog-api-stage:
    build:
      context:  .
      target: stage
    env_file:
      - .env.stage
    ports:
    - "7000:5000"
    
  blog-api-prod:
    build:
      context:  .
      target: prod
    env_file:
      - .env.prod
    ports:
    - "6000:5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"